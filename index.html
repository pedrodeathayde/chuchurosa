<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acervo Chuchu Rosa</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --rosa: #F2A7B8; --rosa-escuro: #C96F86; --rosa-claro: #FDF0F4;
    --verde: #8DB87A; --creme: #FBF7F2; --marrom: #6B4F3A;
    --cinza: #8A8A8A; --borda: #E8DDD5; --texto: #3A2E27;
    --display: "Playfair Display", Georgia, serif;
    --body: "DM Sans", sans-serif;
  }
  body { font-family: var(--body); background: var(--creme); color: var(--texto); min-height: 100vh; }

  /* TOAST */
  .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: #333; color: white;
    padding: 10px 18px; border-radius: 8px; font-size: 13px; z-index: 999;
    opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }

  /* LOADING */
  .loading-screen { position: fixed; inset: 0; background: var(--creme);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 500; gap: 1rem; }
  .loading-screen .logo { font-family: var(--display); font-size: 2rem; color: var(--rosa-escuro); font-style: italic; }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--borda);
    border-top-color: var(--rosa-escuro); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* HEADER */
  header { background: white; border-bottom: 1px solid var(--borda); padding: 0 2rem;
    position: sticky; top: 0; z-index: 100; display: flex; align-items: center;
    gap: 2rem; height: 64px; }
  .logo { font-family: var(--display); font-size: 1.3rem; color: var(--rosa-escuro);
    white-space: nowrap; font-style: italic; }
  .logo span { font-style: normal; font-weight: 600; }
  .search-bar { flex: 1; max-width: 420px; position: relative; }
  .search-bar input { width: 100%; padding: 8px 16px 8px 38px; border: 1px solid var(--borda);
    border-radius: 99px; font-family: var(--body); font-size: 14px; background: var(--creme);
    outline: none; color: var(--texto); transition: border-color 0.2s; }
  .search-bar input:focus { border-color: var(--rosa); }
  .search-bar svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--cinza); pointer-events: none; }
  .header-count { font-size: 13px; color: var(--cinza); white-space: nowrap; }
  .btn-add { margin-left: auto; background: var(--rosa-escuro); color: white; border: none;
    border-radius: 99px; padding: 8px 20px; font-family: var(--body); font-size: 14px;
    font-weight: 500; cursor: pointer; white-space: nowrap; transition: background 0.2s; }
  .btn-add:hover { background: #b55e74; }

  /* LAYOUT */
  .layout { display: flex; min-height: calc(100vh - 64px); }

  /* SIDEBAR */
  aside { width: 220px; min-width: 220px; background: white; border-right: 1px solid var(--borda);
    padding: 1.5rem 0; position: sticky; top: 64px; height: calc(100vh - 64px); overflow-y: auto; }
  .sidebar-title { font-size: 11px; font-weight: 500; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--cinza); padding: 0 1.25rem 0.75rem; }
  .collection-btn { display: flex; align-items: center; gap: 10px; width: 100%;
    padding: 9px 1.25rem; border: none; background: none; font-family: var(--body);
    font-size: 14px; color: var(--texto); cursor: pointer; text-align: left; transition: background 0.15s; }
  .collection-btn:hover { background: var(--creme); }
  .collection-btn.active { background: var(--rosa-claro); color: var(--rosa-escuro); font-weight: 500; }
  .collection-btn .icon { font-size: 18px; width: 22px; text-align: center; }
  .collection-btn .badge { margin-left: auto; background: var(--borda); color: var(--cinza);
    font-size: 11px; padding: 1px 7px; border-radius: 99px; min-width: 22px; text-align: center; }
  .collection-btn.active .badge { background: #f5c5d1; color: var(--rosa-escuro); }
  .sidebar-sep { height: 1px; background: var(--borda); margin: 0.75rem 1.25rem; }

  /* MAIN */
  main { flex: 1; padding: 2rem; }
  .section-header { display: flex; align-items: baseline; gap: 1rem; margin-bottom: 1.5rem; }
  .section-title { font-family: var(--display); font-size: 1.6rem; color: var(--texto); }
  .section-sub { font-size: 13px; color: var(--cinza); }
  .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 1.25rem; }
  .sort-label { font-size: 13px; color: var(--cinza); }
  .sort-select { font-family: var(--body); font-size: 13px; border: 1px solid var(--borda);
    border-radius: 6px; padding: 5px 10px; background: white; color: var(--texto); cursor: pointer; outline: none; }

  /* GRID */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 1.25rem; }

  /* CARD */
  .card { background: white; border: 1px solid var(--borda); border-radius: 12px;
    overflow: hidden; cursor: pointer; transition: transform 0.18s, box-shadow 0.18s; }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
  .card-img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; background: var(--creme); }
  .card-no-img { width: 100%; aspect-ratio: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; background: var(--rosa-claro);
    color: var(--rosa); font-size: 2.5rem; gap: 8px; }
  .card-no-img span { font-size: 12px; color: var(--rosa-escuro); opacity: 0.7; font-family: var(--body); }
  .card-body { padding: 10px 12px 12px; }
  .card-name { font-size: 13px; font-weight: 500; color: var(--texto); line-height: 1.3; margin-bottom: 4px; }
  .card-price { font-size: 13px; color: var(--rosa-escuro); font-weight: 500; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  .tag { font-size: 10px; padding: 2px 7px; border-radius: 99px; background: var(--rosa-claro); color: var(--rosa-escuro); }

  /* EMPTY */
  .empty { text-align: center; padding: 4rem 2rem; color: var(--cinza); }
  .empty .big { font-size: 3rem; margin-bottom: 1rem; }

  /* MODAL */
  .overlay { display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(58,46,39,0.45); align-items: center; justify-content: center; }
  .overlay.open { display: flex; }
  .modal { background: white; border-radius: 16px; width: 90%; max-width: 520px;
    max-height: 90vh; overflow-y: auto; padding: 2rem; position: relative; }
  .modal-close { position: absolute; top: 1rem; right: 1rem; background: none;
    border: none; font-size: 22px; cursor: pointer; color: var(--cinza); line-height: 1; }
  .modal h2 { font-family: var(--display); font-size: 1.3rem; margin-bottom: 1.25rem; }
  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--cinza); margin-bottom: 5px; }
  .form-group input, .form-group select {
    width: 100%; padding: 9px 12px; border: 1px solid var(--borda); border-radius: 8px;
    font-family: var(--body); font-size: 14px; color: var(--texto); background: white;
    outline: none; transition: border-color 0.2s; }
  .form-group input:focus { border-color: var(--rosa); }
  .coll-checkboxes { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
  .coll-check { display: flex; align-items: center; gap: 5px; background: var(--creme);
    border: 1px solid var(--borda); border-radius: 99px; padding: 4px 12px;
    font-size: 13px; cursor: pointer; user-select: none; transition: all 0.15s; }
  .coll-check input { display: none; }
  .coll-check.checked { background: var(--rosa-claro); border-color: var(--rosa); color: var(--rosa-escuro); }
  .btn-row { display: flex; gap: 10px; margin-top: 1.5rem; justify-content: flex-end; }
  .btn-secondary { padding: 9px 20px; border: 1px solid var(--borda); border-radius: 8px;
    background: white; font-family: var(--body); font-size: 14px; cursor: pointer; color: var(--texto); }
  .btn-primary { padding: 9px 20px; background: var(--rosa-escuro); border: none;
    border-radius: 8px; color: white; font-family: var(--body); font-size: 14px;
    font-weight: 500; cursor: pointer; }
  .btn-primary:hover { background: #b55e74; }
  .btn-danger { padding: 9px 20px; background: #fee2e2; border: none; border-radius: 8px;
    color: #b91c1c; font-family: var(--body); font-size: 14px; cursor: pointer; margin-right: auto; }

  /* DETAIL */
  .detail-img { width: 100%; border-radius: 10px; object-fit: cover; max-height: 320px;
    display: block; margin-bottom: 0.75rem; background: var(--creme); }
  .detail-no-img { width: 100%; height: 160px; border-radius: 10px; background: var(--rosa-claro);
    display: flex; align-items: center; justify-content: center; font-size: 3.5rem; margin-bottom: 1rem; }
  .detail-name { font-family: var(--display); font-size: 1.4rem; margin-bottom: 0.25rem; }
  .detail-price { font-size: 1.1rem; color: var(--rosa-escuro); font-weight: 500; margin-bottom: 1rem; }
  .detail-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.25rem; }
  .detail-tags .tag { font-size: 12px; padding: 4px 12px; }

  /* GALLERY */
  .gallery-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; justify-content: center; }
  .gallery-nav button { background: white; border: 1px solid var(--borda); border-radius: 6px;
    padding: 4px 12px; font-size: 18px; cursor: pointer; transition: border-color 0.15s; }
  .gallery-nav button:hover:not(:disabled) { border-color: var(--rosa); }
  .gallery-nav button:disabled { opacity: 0.3; cursor: default; }
  .gallery-nav span { font-size: 13px; color: var(--cinza); min-width: 40px; text-align: center; }
  .btn-del-photo { margin-left: auto; background: #fee2e2; border: none; border-radius: 6px;
    padding: 4px 10px; font-size: 12px; color: #b91c1c; cursor: pointer; font-family: var(--body); }

  /* UPLOAD ZONE */
  .upload-zone { border: 2px dashed var(--borda); border-radius: 10px; padding: 1.25rem;
    text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; margin-bottom: 1rem; }
  .upload-zone:hover { border-color: var(--rosa); background: var(--rosa-claro); }
  .upload-zone.dragover { border-color: var(--rosa-escuro); background: var(--rosa-claro); }
  .upload-zone .icon { font-size: 1.8rem; }
  .upload-zone p { font-size: 13px; color: var(--cinza); margin-top: 4px; }
  .upload-progress { margin-top: 8px; font-size: 12px; color: var(--rosa-escuro); display: none; }

  @media (max-width: 700px) {
    aside { display: none; }
    .grid { grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
    main { padding: 1rem; }
    header { padding: 0 1rem; gap: 1rem; }
  }
</style>
</head>

<div class="loading-screen" id="loadingScreen">

  <div class="spinner"></div>
</div>

<div class="toast" id="toast"></div>

<header>
  <div class="logo">Chuchu <span>Rosa</span></div>

    <input type="text" id="searchInput" placeholder="Buscar produto..." oninput="applyFilters()">
  </div>
  <span class="header-count" id="headerCount"></span>
  <button class="btn-add" onclick="openAddModal()">+ Novo produto</button>
</header>

<div class="layout">
  <aside id="sidebar"></aside>
  <main>
    <div class="section-header">
      <h1 class="section-title" id="sectionTitle">Todos os produtos</h1>
      <span class="section-sub" id="sectionSub"></span>
    </div>
    <div class="toolbar">
      <span class="sort-label">Ordenar:</span>
      <select class="sort-select" id="sortSelect" onchange="applyFilters()">
        <option value="az">Nome A–Z</option>
        <option value="za">Nome Z–A</option>
        <option value="asc">Menor preço</option>
        <option value="desc">Maior preço</option>
        <option value="foto">Com foto primeiro</option>
      </select>
    </div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="emptyState" style="display:none">
      <div class="big">🌸</div><p>Nenhum produto encontrado.</p>
    </div>
  </main>
</div>

<!-- ADD/EDIT MODAL -->
<div class="overlay" id="addModal">
  <div class="modal">
    <button class="modal-close" onclick="closeAddModal()">×</button>
    <h2 id="modalTitle">Novo produto</h2>
    <div class="form-group">
      <label>Nome do produto</label>
      <input type="text" id="fName" placeholder="Ex: Fantasia de Unicórnio">
    </div>
    <div class="form-group">
      <label>Preço (R$)</label>
      <input type="number" id="fPrice" step="0.01" placeholder="0,00">
    </div>
    <div class="form-group">
      <label>Coleções</label>
      <div class="coll-checkboxes" id="collCheckboxes"></div>
    </div>
    <div class="btn-row">
      <button class="btn-danger" id="btnDelete" onclick="deleteProduct()" style="display:none">Excluir</button>
      <button class="btn-secondary" onclick="closeAddModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveProduct()">Salvar</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="overlay" id="detailModal">
  <div class="modal">
    <button class="modal-close" onclick="closeDetail()">×</button>
    <div id="detailImg"></div>
    <div class="detail-name" id="detailName"></div>
    <div class="detail-price" id="detailPrice"></div>
    <div class="detail-tags" id="detailTags"></div>
    <div class="upload-zone" id="uploadZone"
         onclick="document.getElementById('detailUpload').click()"
         ondragover="event.preventDefault();this.classList.add('dragover')"
         ondragleave="this.classList.remove('dragover')"
         ondrop="handleDrop(event)">
      <div class="icon">📷</div>
      <p>Clique ou arraste fotos aqui (várias de uma vez)</p>
    </div>
    <div class="upload-progress" id="uploadProgress"></div>
    <input type="file" id="detailUpload" accept="image/*" multiple style="display:none" onchange="uploadPhotos(this.files)">
    <div class="btn-row">
      <button class="btn-secondary" onclick="openEditFromDetail()">✏️ Editar</button>
      <button class="btn-primary" onclick="closeDetail()">Fechar</button>
    </div>
  </div>
</div>

// ── SUPABASE HELPERS ──────────────────────────────────────────

async function loadProducts() {
  const { data, error } = await sb.from("produtos").select("*").order("name");
  if (error) { showToast("Erro ao carregar produtos: " + error.message); return []; }
  return data;
}

async function loadFotos(produtoId) {
  const { data, error } = await sb.from("fotos").select("*").eq("produto_id", produtoId).order("ordem");
  if (error) return [];
  return data;
}

async function loadAllFotos() {
  const { data, error } = await sb.from("fotos").select("*").order("ordem");
  if (error) return [];
  // build map
  const map = {};
  for (const f of data) {
    if (!map[f.produto_id]) map[f.produto_id] = [];
    map[f.produto_id].push(f);
  }
  return map;
}

async function upsertProduct(name, price, collections) {
  const { data, error } = await sb.from("produtos")
    .insert({ name, price, collections })
    .select().single();
  if (error) throw error;
  return data;
}

async function updateProduct(id, name, price, collections) {
  const { error } = await sb.from("produtos").update({ name, price, collections }).eq("id", id);
  if (error) throw error;
}

async function deleteProductDB(id) {
  // fotos cascade deletes via FK, but also delete from storage
  const fotos = fotosMap[id] || [];
  for (const f of fotos) {
    const path = f.url.split("/Fotos/")[1];
    if (path) await sb.storage.from("Fotos").remove([path]);
  }
  const { error } = await sb.from("produtos").delete().eq("id", id);
  if (error) throw error;
}

async function uploadFoto(produtoId, file) {
  const ext = file.name.split(".").pop().toLowerCase() || "jpg";
  const path = `${produtoId}/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
  const { error: upErr } = await sb.storage.from("Fotos").upload(path, file, { upsert: false });
  if (upErr) throw upErr;
  const { data: { publicUrl } } = sb.storage.from("Fotos").getPublicUrl(path);
  const ordem = (fotosMap[produtoId] || []).length;
  const { data: fRow, error: dbErr } = await sb.storage && await sb.from("fotos")
    .insert({ produto_id: produtoId, url: publicUrl, ordem }).select().single();
  if (dbErr) throw dbErr;
  if (!fotosMap[produtoId]) fotosMap[produtoId] = [];
  fotosMap[produtoId].push(fRow);
  return fRow;
}

async function deleteFotoDB(fotoId, url) {
  const path = url.split("/object/public/Fotos/")[1];
  if (path) await sb.storage.from("Fotos").remove([decodeURIComponent(path)]);
  await sb.from("fotos").delete().eq("id", fotoId);
  for (const pid in fotosMap) {
    fotosMap[pid] = fotosMap[pid].filter(f => f.id !== fotoId);
  }
}

  showToast("Primeira vez! Importando produtos...");
  const chunks = [];
  for (let i = 0; i < RAW.length; i += 50) chunks.push(RAW.slice(i, i+50));
  for (const chunk of chunks) {
    await sb.from("produtos").insert(chunk.map(([name, price, collections]) => ({ name, price, collections })));
  }
  showToast("✓ " + RAW.length + " produtos importados!");
}

// ── INIT ──────────────────────────────────────────────────────

async function init() {
  await seedIfEmpty();
  products = await loadProducts();
  fotosMap = await loadAllFotos();
  document.getElementById("loadingScreen").style.display = "none";
  buildSidebar();
  applyFilters();
}

// ── UI ────────────────────────────────────────────────────────

function showToast(msg, duration = 2500) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), duration);
}

function buildSidebar() {
  const sidebar = document.getElementById("sidebar");
  let html = `<div class="sidebar-title">Coleções</div>`;
  const allActive = activeCollection === "all" ? "active" : "";
  html += `<button class="collection-btn ${allActive}" onclick="setCollection('all')">
    <span class="icon">🌸</span> Todos <span class="badge">${products.length}</span></button>`;
  html += `<div class="sidebar-sep"></div>`;
  for (const c of COLLECTIONS) {
    const count = products.filter(p => p.collections && p.collections.includes(c.id)).length;
    const active = activeCollection === c.id ? "active" : "";
    html += `<button class="collection-btn ${active}" onclick="setCollection('${c.id}')">
      <span class="icon">${c.icon}</span> ${c.label} <span class="badge">${count}</span></button>`;
  }
  sidebar.innerHTML = html;
}

function setCollection(id) {
  activeCollection = id;
  document.getElementById("searchInput").value = "";
  buildSidebar();
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById("searchInput").value.toLowerCase().trim();
  const sort = document.getElementById("sortSelect").value;
  let list = [...products];
  if (activeCollection !== "all") list = list.filter(p => p.collections && p.collections.includes(activeCollection));
  if (q) list = list.filter(p => p.name.toLowerCase().includes(q));
  if (sort === "az") list.sort((a,b) => a.name.localeCompare(b.name,"pt"));
  else if (sort === "za") list.sort((a,b) => b.name.localeCompare(a.name,"pt"));
  else if (sort === "asc") list.sort((a,b) => a.price - b.price);
  else if (sort === "desc") list.sort((a,b) => b.price - a.price);
  else if (sort === "foto") list.sort((a,b) => ((fotosMap[b.id]||[]).length > 0 ? 1 : 0) - ((fotosMap[a.id]||[]).length > 0 ? 1 : 0));
  renderGrid(list);
  const collLabel = activeCollection === "all" ? "Todos os produtos" : COLLECTIONS.find(c => c.id === activeCollection)?.label || "";
  document.getElementById("sectionTitle").textContent = collLabel;
  document.getElementById("sectionSub").textContent = `${list.length} produto${list.length !== 1 ? "s" : ""}`;
  document.getElementById("headerCount").textContent = `${list.length} produto${list.length !== 1 ? "s" : ""}`;
}

function renderGrid(list) {
  const grid = document.getElementById("grid");
  const empty = document.getElementById("emptyState");
  if (!list.length) { grid.innerHTML = ""; empty.style.display = "block"; return; }
  empty.style.display = "none";
  grid.innerHTML = list.map(p => {
    const fotos = fotosMap[p.id] || [];
    const tags = (p.collections || []).map(cid => {
      const c = COLLECTIONS.find(x => x.id === cid);
      return c ? `<span class="tag">${c.label}</span>` : "";
    }).join("");
    const imgHtml = fotos.length > 0
      ? `<img class="card-img" src="${fotos[0].url}" alt="${p.name}" loading="lazy">`
      : `<div class="card-no-img">🌸<span>sem foto</span></div>`;
    return `<div class="card" onclick="openDetail(${p.id})">
      ${imgHtml}
      <div class="card-body">
        <div class="card-name">${p.name}</div>
        <div class="card-price">R$ ${Number(p.price).toFixed(2).replace(".",",")}</div>
        <div class="card-tags">${tags}</div>
      </div></div>`;
  }).join("");
}

// ── ADD / EDIT MODAL ──────────────────────────────────────────

function openAddModal(id = null) {
  editingId = id;
  document.getElementById("modalTitle").textContent = id ? "Editar produto" : "Novo produto";
  document.getElementById("btnDelete").style.display = id ? "block" : "none";
  const checkboxes = document.getElementById("collCheckboxes");
  checkboxes.innerHTML = COLLECTIONS.map(c =>
    `<label class="coll-check" id="chk_${c.id}"><input type="checkbox" value="${c.id}" onchange="updateCheck('${c.id}')"> ${c.icon} ${c.label}</label>`
  ).join("");
  if (id) {
    const p = products.find(x => x.id === id);
    document.getElementById("fName").value = p.name;
    document.getElementById("fPrice").value = p.price;
    (p.collections || []).forEach(cid => {
      const el = document.querySelector(`#chk_${cid} input`);
      if (el) { el.checked = true; document.getElementById(`chk_${cid}`).classList.add("checked"); }
    });
  } else {
    document.getElementById("fName").value = "";
    document.getElementById("fPrice").value = "";
  }
  closeDetail();
  document.getElementById("addModal").classList.add("open");
}

function updateCheck(cid) {
  const el = document.querySelector(`#chk_${cid} input`);
  document.getElementById(`chk_${cid}`).classList.toggle("checked", el.checked);
}

function closeAddModal() {
  document.getElementById("addModal").classList.remove("open");
  editingId = null;
}

async function saveProduct() {
  const name = document.getElementById("fName").value.trim();
  const price = parseFloat(document.getElementById("fPrice").value);
  if (!name || isNaN(price)) { alert("Preencha nome e preço."); return; }
  const colls = Array.from(document.querySelectorAll("#collCheckboxes input:checked")).map(x => x.value);
  try {
    if (editingId) {
      await updateProduct(editingId, name, price, colls);
      const p = products.find(x => x.id === editingId);
      p.name = name; p.price = price; p.collections = colls;
      showToast("✓ Produto atualizado");
    } else {
      const p = await upsertProduct(name, price, colls);
      products.push(p);
      showToast("✓ Produto adicionado");
    }
    buildSidebar(); applyFilters(); closeAddModal();
  } catch(e) { showToast("Erro: " + e.message); }
}

async function deleteProduct() {
  if (!editingId || !confirm("Excluir este produto?")) return;
  try {
    await deleteProductDB(editingId);
    products = products.filter(p => p.id !== editingId);
    delete fotosMap[editingId];
    buildSidebar(); applyFilters(); closeAddModal();
    showToast("Produto excluído");
  } catch(e) { showToast("Erro: " + e.message); }
}

// ── DETAIL MODAL ──────────────────────────────────────────────

function openDetail(id) {
  detailId = id;
  galleryIdx = 0;
  const p = products.find(x => x.id === id);
  document.getElementById("detailName").textContent = p.name;
  document.getElementById("detailPrice").textContent = `R$ ${Number(p.price).toFixed(2).replace(".",",")}`;
  const tags = (p.collections || []).map(cid => {
    const c = COLLECTIONS.find(x => x.id === cid);
    return c ? `<span class="tag">${c.icon} ${c.label}</span>` : "";
  }).join("");
  document.getElementById("detailTags").innerHTML = tags;
  document.getElementById("uploadProgress").style.display = "none";
  renderGallery();
  document.getElementById("detailModal").classList.add("open");
}

function closeDetail() { document.getElementById("detailModal").classList.remove("open"); detailId = null; }

function renderGallery() {
  const fotos = fotosMap[detailId] || [];
  const el = document.getElementById("detailImg");
  if (!fotos.length) { el.innerHTML = `<div class="detail-no-img">🌸</div>`; return; }
  galleryIdx = Math.min(galleryIdx, fotos.length - 1);
  const nav = fotos.length > 1
    ? `<div class="gallery-nav">
        <button onclick="galleryPrev()" ${galleryIdx === 0 ? "disabled" : ""}>‹</button>
        <span>${galleryIdx + 1} / ${fotos.length}</span>
        <button onclick="galleryNext()" ${galleryIdx === fotos.length - 1 ? "disabled" : ""}>›</button>
        <button class="btn-del-photo" onclick="removeFoto()">🗑</button>
       </div>`
    : `<div class="gallery-nav" style="justify-content:flex-end">
        <button class="btn-del-photo" onclick="removeFoto()">🗑 Remover foto</button>
       </div>`;
  el.innerHTML = `<img class="detail-img" src="${fotos[galleryIdx].url}" alt="">${nav}`;
}

function galleryPrev() { galleryIdx = Math.max(0, galleryIdx - 1); renderGallery(); }
function galleryNext() { galleryIdx = Math.min((fotosMap[detailId]||[]).length - 1, galleryIdx + 1); renderGallery(); }

async function removeFoto() {
  const fotos = fotosMap[detailId] || [];
  if (!fotos.length || !confirm("Remover esta foto?")) return;
  const f = fotos[galleryIdx];
  try {
    await deleteFotoDB(f.id, f.url);
    galleryIdx = Math.max(0, galleryIdx - 1);
    renderGallery();
    applyFilters();
    showToast("Foto removida");
  } catch(e) { showToast("Erro: " + e.message); }
}

async function uploadPhotos(files) {
  if (!files.length || !detailId) return;
  const prog = document.getElementById("uploadProgress");
  prog.style.display = "block";
  let done = 0;
  for (const file of Array.from(files)) {
    prog.textContent = `Enviando ${done + 1} de ${files.length}...`;
    try {
      await uploadFoto(detailId, file);
      done++;
    } catch(e) { showToast("Erro no upload: " + e.message); }
  }
  prog.textContent = `✓ ${done} foto${done !== 1 ? "s" : ""} adicionada${done !== 1 ? "s" : ""}!`;
  setTimeout(() => prog.style.display = "none", 2000);
  galleryIdx = (fotosMap[detailId] || []).length - 1;
  renderGallery();
  applyFilters();
  document.getElementById("detailUpload").value = "";
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById("uploadZone").classList.remove("dragover");
  uploadPhotos(e.dataTransfer.files);
}

function openEditFromDetail() { const id = detailId; closeDetail(); openAddModal(id); }

// CLOSE ON OVERLAY CLICK
document.getElementById("addModal").addEventListener("click", e => { if (e.target === document.getElementById("addModal")) closeAddModal(); });
document.getElementById("detailModal").addEventListener("click", e => { if (e.target === document.getElementById("detailModal")) closeDetail(); });

init();
</script>
